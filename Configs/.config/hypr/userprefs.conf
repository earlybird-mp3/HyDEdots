# Set your personal hyprland configuration here
# See https://wiki.hypr.land/Configuring for more information

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hypr.land/Configuring/Variables/#input
input {
     kb_layout = de
    # follow_mouse = 1
     sensitivity = -0.15
    # force_no_accel = 0
     accel_profile = flat
    # numlock_by_default = true

    # 🔗 See https://wiki.hypr.land/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = yes
	scroll_factor = 0.3
    }

}

device {
      name = mx-anywhere-2s-mouse
	sensitivity = 0.15
	accel_profile = flat
} 

# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}


general {
    gaps_in= 1
    gaps_out= 1
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.85

    rounding = 4
    rounding_power = 2
}

# Lock screen when laptop lid is closed
bindl = , switch:on:Lid Switch, exec, hyde-shell lock-session
